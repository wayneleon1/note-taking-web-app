<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Login | Note-taking web app</title>
    <link rel="stylesheet" href="/styles/index.css" />
    <link rel="stylesheet" href="/styles/login.css" />
  </head>
  <body>
    <div class="auth-card">
      <!-- Logo -->
      <a href="#" class="auth-logo" aria-label="Notes home">
        <img src="/assets/images/logo.svg" alt="Notes" />
      </a>

      <!-- Heading -->
      <div class="auth-heading">
        <h1>Welcome to Notes</h1>
        <p>Please log in to continue</p>
      </div>

      <!-- Error banner -->
      <div
        class="auth-error"
        id="auth-error"
        style="display: none"
        role="alert"
      ></div>

      <!-- Form -->
      <form class="auth-form" id="login-form" novalidate>
        <div class="input-group" id="email-group">
          <label class="input-label" for="login-email">Email Address</label>
          <div class="input-wrapper">
            <input
              class="input"
              id="login-email"
              type="email"
              placeholder="email@example.com"
              autocomplete="email"
            />
          </div>
          <p
            class="input-hint input-hint--error"
            id="email-error"
            style="display: none"
          ></p>
        </div>

        <div class="input-group" id="pw-group">
          <div class="password-label-row">
            <label class="input-label" for="login-password">Password</label>
            <a href="#" class="forgot-link">Forgot</a>
          </div>
          <div class="input-wrapper">
            <input
              class="input"
              id="login-password"
              type="password"
              placeholder=""
              autocomplete="current-password"
            />
            <button
              type="button"
              class="input-icon input-icon--right pw-toggle-btn"
              id="toggle-login-password"
              aria-label="Show password"
            >
              <img
                src="/assets/images/icon-show-password.svg"
                alt=""
                class="pw-eye-show"
              />
              <img
                src="/assets/images/icon-hide-password.svg"
                alt=""
                class="pw-eye-hide"
                style="display: none"
              />
            </button>
          </div>
          <p
            class="input-hint input-hint--error"
            id="pw-error"
            style="display: none"
          ></p>
        </div>

        <button type="submit" class="btn btn-primary" id="login-btn">
          Login
        </button>
      </form>

      <!-- Social -->
      <div class="auth-divider">Or log in with:</div>
      <button type="button" class="btn-google" id="btn-google-login">
        <svg
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Google
      </button>

      <!-- Footer -->
      <p class="auth-footer">
        No account yet? <a href="signup.html">Sign Up</a>
      </p>
    </div>

    <script src="auth.js"></script>
    <script>
      // Redirect if already logged in
      if (AuthService.isLoggedIn()) window.location.href = "index.html";

      // Password toggle
      document
        .getElementById("toggle-login-password")
        .addEventListener("click", function () {
          const input = document.getElementById("login-password");
          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";
          this.querySelector(".pw-eye-show").style.display = isPassword
            ? "none"
            : "block";
          this.querySelector(".pw-eye-hide").style.display = isPassword
            ? "block"
            : "none";
          this.setAttribute(
            "aria-label",
            isPassword ? "Hide password" : "Show password",
          );
        });

      // Form submit
      document
        .getElementById("login-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("login-email").value.trim();
          const password = document.getElementById("login-password").value;
          const result = AuthService.login(email, password);

          // Clear errors
          document.getElementById("email-error").style.display = "none";
          document.getElementById("pw-error").style.display = "none";
          document
            .getElementById("email-group")
            .classList.remove("input-group--error");
          document
            .getElementById("pw-group")
            .classList.remove("input-group--error");
          document.getElementById("auth-error").style.display = "none";

          if (result.success) {
            window.location.href = "index.html";
          } else {
            if (result.field === "email") {
              document
                .getElementById("email-group")
                .classList.add("input-group--error");
              document.getElementById("email-error").textContent =
                result.message;
              document.getElementById("email-error").style.display = "flex";
            } else if (result.field === "password") {
              document
                .getElementById("pw-group")
                .classList.add("input-group--error");
              document.getElementById("pw-error").textContent = result.message;
              document.getElementById("pw-error").style.display = "flex";
            } else {
              document.getElementById("auth-error").textContent =
                result.message;
              document.getElementById("auth-error").style.display = "block";
            }
          }
        });

      // Google login (simulated)
      document
        .getElementById("btn-google-login")
        .addEventListener("click", function () {
          const result = AuthService.loginWithGoogle();
          if (result.success) window.location.href = "index.html";
        });
    </script>
  </body>
</html>
