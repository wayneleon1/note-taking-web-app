<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Login | Note-taking web app</title>

    <link rel="stylesheet" href="/styles/index.css" />
    <link rel="stylesheet" href="/styles/login.css" />
  </head>
  <body>
    <div class="auth-card">
      <!-- Logo -->
      <a href="#" class="auth-logo" aria-label="Notes home">
        <img src="/assets/images/logo.svg" />
      </a>

      <!-- Heading -->
      <div class="auth-heading">
        <h1>Welcome to Notes</h1>
        <p>Please log in to continue</p>
      </div>

      <!-- Form -->
      <form class="auth-form" novalidate>
        <!-- Email -->
        <div class="input-group">
          <label class="input-label" for="login-email">Email Address</label>
          <div class="input-wrapper">
            <input
              class="input"
              id="login-email"
              type="email"
              placeholder="email@example.com"
              autocomplete="email"
              style="padding-left: 14px; padding-right: 14px"
            />
          </div>
        </div>

        <!-- Password + Forgot row -->
        <div class="input-group">
          <div class="password-label-row">
            <label class="input-label" for="login-password">Password</label>
            <a href="#" class="forgot-link">Forgot</a>
          </div>
          <div class="input-wrapper">
            <input
              class="input"
              id="login-password"
              type="password"
              placeholder=""
              autocomplete="current-password"
              style="padding-left: 14px; padding-right: 42px"
            />
            <!-- Toggle visibility -->
            <button
              type="button"
              class="input-icon input-icon--right"
              id="toggle-login-password"
              aria-label="Toggle password visibility"
              style="
                pointer-events: all;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
              "
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <!-- Social -->
      <div class="auth-divider">Or log in with:</div>

      <button type="button" class="btn-google">
        <svg
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Google
      </button>

      <!-- Footer -->
      <p class="auth-footer">
        No account yet? <a href="signup.html">Sign Up</a>
      </p>
    </div>

    <script>
      // Password visibility toggle
      const toggleBtn = document.getElementById("toggle-login-password");
      const pwField = document.getElementById("login-password");

      toggleBtn.addEventListener("click", () => {
        const isPassword = pwField.type === "password";
        pwField.type = isPassword ? "text" : "password";
        toggleBtn.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Toggle password visibility",
        );
      });

      // Basic client-side validation
      document.querySelector(".auth-form").addEventListener("submit", (e) => {
        e.preventDefault();

        const emailGroup = document
          .getElementById("login-email")
          .closest(".input-group");
        const pwGroup = document
          .getElementById("login-password")
          .closest(".input-group");
        let valid = true;

        [emailGroup, pwGroup].forEach((g) =>
          g.classList.remove("input-group--error"),
        );

        if (!document.getElementById("login-email").value.includes("@")) {
          emailGroup.classList.add("input-group--error");
          valid = false;
        }
        if (document.getElementById("login-password").value.length < 1) {
          pwGroup.classList.add("input-group--error");
          valid = false;
        }

        if (valid) {
          // TODO: submit to your backend
          console.log("Form valid — submit");
        }
      });
    </script>
  </body>
</html>
